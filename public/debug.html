<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Debug</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Deployment Debug</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test basic connectivity
        addResult('Testing deployment status...', 'info');
        addResult(`Current URL: ${window.location.href}`, 'info');
        addResult(`User Agent: ${navigator.userAgent}`, 'info');
        addResult(`Timestamp: ${new Date().toISOString()}`, 'info');
        
        // Test if we can fetch the main JS file
        const jsFile = '/assets/index-BqZV3_pP.js';
        
        fetch(jsFile)
            .then(response => {
                addResult(`JS file status: ${response.status}`, response.ok ? 'success' : 'error');
                addResult(`Content-Type: ${response.headers.get('content-type')}`, 'info');
                addResult(`Content-Length: ${response.headers.get('content-length')}`, 'info');
                
                if (!response.ok) {
                    return response.text().then(text => {
                        addResult(`Response body: ${text.substring(0, 200)}...`, 'error');
                    });
                } else {
                    addResult('JS file loaded successfully!', 'success');
                }
            })
            .catch(error => {
                addResult(`Fetch error: ${error.message}`, 'error');
            });
            
        // Test other critical files
        const criticalFiles = [
            '/assets/vendor-C_yplrzs.js',
            '/assets/index-BuQFfNnV.css',
            '/manifest.webmanifest'
        ];
        
        criticalFiles.forEach(file => {
            fetch(file, { method: 'HEAD' })
                .then(response => {
                    addResult(`${file}: ${response.status}`, response.ok ? 'success' : 'error');
                })
                .catch(error => {
                    addResult(`${file}: Error - ${error.message}`, 'error');
                });
        });
    </script>
</body>
</html>
