repository: https://gitlab.com/nickhntv/treasures

name: Treasures

summary: Decentralized geocaching on Nostr

description: |
  Treasures is a free, open-source geocaching app built on the Nostr protocol.
  Hide and discover geocaches around the world without centralized servers
  or subscriptions.

  Features:
  - Create and discover geocaches worldwide
  - GPS-powered compass navigation to cache locations
  - Log finds with photos and verification
  - Multiple themes including adventure/pirate mode
  - Offline support for fieldwork
  - Lightning zaps for geocache creators
  - Fully decentralized — your data lives on Nostr relays

tags:
  - nostr
  - geocaching
  - outdoor
  - adventure
  - maps
  - decentralized

license: AGPL-3.0

website: https://treasures.to

icon: ./public/icon.svg

supported_nips:
  - "01"  # Basic protocol — events, filters, subscriptions
  - "05"  # DNS-based identifiers (NIP-05 verification)
  - "07"  # Browser extension signing (window.nostr)
  - "09"  # Event deletion (kind 5)
  - "19"  # Bech32 identifiers (npub, note, nevent, naddr, nprofile)
  - "25"  # Reactions (kind 7)
  - "46"  # Nostr remote signing / bunker
  - "47"  # Nostr Wallet Connect (NWC) for Lightning payments
  - "55"  # Android signing via Amber
  - "57"  # Lightning zaps (kind 9734/9735)
  - "65"  # Relay list metadata (kind 10002)
  - "92"  # Inline file metadata (imeta tag)
  - "GC"  # Geocaching (kind 37516 cache listings, kind 7516 found logs)
