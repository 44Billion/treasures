repository: https://gitlab.com/chad.curtis/treasures

name: Treasures

summary: Decentralized geocaching on Nostr

description: |
  Treasures is a free, open-source geocaching app built on the Nostr protocol.
  Hide and discover geocaches around the world without centralized servers
  or subscriptions.

  Features:
  - Create and discover geocaches worldwide
  - GPS-powered compass navigation to cache locations
  - Log finds with photos and verification
  - Multiple themes including adventure/pirate mode
  - Offline support for fieldwork
  - Lightning zaps for geocache creators
  - Fully decentralized — your data lives on Nostr relays

